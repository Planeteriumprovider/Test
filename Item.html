<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnaX | Marktplatz</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00dc82;
            --primary-V2: #00dc82;
            --primary-glow: rgba(0, 220, 130, 0.25);
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.6);
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        #bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #0f172a 0%, #020617 100%);
            z-index: -1;
        }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px);
            z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-family: 'Rubik Mono One'; 
            font-size: 1.6rem; 
            color: var(--primary);
            letter-spacing: -1px;
        }

        .btn-V2 {
            background: var(--primary-V2); color: #000; padding: 12px 28px;
            border-radius: 12px; font-weight: 800; text-decoration: none;
            display: inline-block; cursor: pointer; border: none; transition: 0.3s;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .btn-V2:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }

        .nav-links { display: flex; align-items: center; }
        .nav-links a {
            color: var(--text); text-decoration: none; margin-left: 30px;
            font-weight: 600; transition: 0.3s; opacity: 0.7;
        }
        .nav-links a:hover { opacity: 1; color: var(--primary); }

        /* Hamburger Animation (1zu1) */
        .hamburger { display: none; cursor: pointer; z-index: 1100; }
        .bar { display: block; width: 28px; height: 3px; margin: 5px auto; background-color: var(--primary); transition: 0.3s; border-radius: 3px; }

        @media (max-width: 768px) {
            nav { padding: 15px 25px; }
            .hamburger { display: block; }
            .hamburger.active .bar:nth-child(2) { opacity: 0; }
            .hamburger.active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
            .hamburger.active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
            .nav-links {
                position: fixed; right: -100%; top: 0; flex-direction: column;
                background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(25px);
                width: 100%; height: 100vh; justify-content: center; transition: 0.4s; gap: 40px;
            }
            .nav-links.active { right: 0; }
            .nav-links a { margin: 0; font-size: 1.5rem; }
        }

        /* Header Bereich */
        .market-header {
            padding: 160px 10% 60px;
            text-align: center;
        }
        .market-header span {
            color: var(--primary); font-weight: 800; letter-spacing: 5px; font-size: 0.9rem;
            text-transform: uppercase;
        }
        .market-header h1 {
            font-family: 'Rubik Mono One'; font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 15px 0; background: linear-gradient(180deg, #fff 30%, #475569);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .market-header p {
            max-width: 700px; margin: 0 auto; color: var(--muted);
            font-size: 1.2rem; line-height: 1.8;
        }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 20px 10% 100px;
        }

        .item-card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 30px;
            padding: 40px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .item-card:hover {
            transform: translateY(-15px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px var(--primary-glow);
        }

        .item-card i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 25px;
            display: inline-block;
        }

        .item-card h3 {
            margin: 0 0 15px 0;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .item-card p {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            min-height: 50px;
        }

        .price-tag {
            background: linear-gradient(135deg, var(--primary), #00b36a);
            color: #020617;
            padding: 10px 22px;
            border-radius: 14px;
            font-weight: 900;
            display: inline-block;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-discord {
            background: var(--primary);
            color: #020617;
            padding: 14px 30px;
            border-radius: 14px;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-discord:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--primary);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="bg-glow"></div>

    <nav>
        <div class="logo">SNAX</div>
        
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <div class="nav-links" id="nav-links">
        <a href="Startseite.html" onclick="toggleMenu()"><i class="fas fa-house"></i> Über uns</a>
        <a href="Item.html" onclick="toggleMenu()"><i class="fas fa-shopping-bag"></i> Items</a>
        <a href="Rules.html" onclick="toggleMenu()"><i class="fas fa-gavel"></i> Regeln</a>
        <a href="Admin.html" onclick="toggleMenu()"><i class="fas fa-user-shield"></i> Admin</a>
        <a href="https://discord.gg/eBZRakvCEW" class="btn-V2"><i class="fab fa-discord"></i> Discord</a>
        </div>
    </nav>

    <header class="market-header">
        <span>SnaX Official Store</span>
        <h1>ITEM KATALOG</h1>
        <p>
            Veredle dein Spielerlebnis mit unseren exklusiven Community-Inhalten. 
            Jedes Item wurde sorgfältig ausgewählt, um dir den bestmöglichen Vorteil und Style zu bieten.
        </p>
    </header>

    <main class="grid" id="item-list">
        </main>

    <script>

/* Globaler Speicher */
  let items = JSON.parse(localStorage.getItem('snax_items')) || [];


        const itemList = document.getElementById('item-list');
        
        items.forEach(item => {
            itemList.innerHTML += `
                <div class="item-card">
                    <i class="fas ${item.icon}"></i>
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                    <div class="price-tag">${item.price}</div>
                </div>
            `;
        });

        // Hamburger Menu Logik (1zu1 erhalten)
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');

        hamburger.addEventListener('click', () => {
            toggleMenu();
        });

        function toggleMenu() {
            if (window.innerWidth <= 768) {
                hamburger.classList.toggle('active');
                navLinks.classList.toggle('active');
                document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : 'auto';
            }
        }
    </script>
</body>
</html>
